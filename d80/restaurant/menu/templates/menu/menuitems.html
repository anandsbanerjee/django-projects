<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Menu</title>
</head>
<body>

<h1>Restaurant Menu</h1>

<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Category</th>
        </tr>
    </thead>

    <tbody>
        {% for item in menu_items %}
        <tr>
            <td>{{ item.id }}</td>
            <td>{{ item.name }}</td>
            <td>{{ item.price }}</td>
            <td>{{ item.category }}</td>
        </tr>
        {% endfor %}
    </tbody>

</table>

</body>
</html>
